<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo-bg.png" />
    <title>Phalanx Cyber Academy</title>
    <script>
      (function () {
        try {
          const savedTheme = localStorage.getItem('cyberquest-theme') || 'system';
          const isDark =
            savedTheme === 'dark' ||
            (savedTheme === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
